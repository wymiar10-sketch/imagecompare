name: Build ImageCompare Portable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow pytesseract pyinstaller

      - name: Install Tesseract via Chocolatey
        run: choco install tesseract --no-progress -y
        shell: cmd

      - name: Copy Tesseract to workspace
        run: |
          $tessDir = "C:\Program Files\Tesseract-OCR"
          if (!(Test-Path $tessDir)) {
            $tessDir = "C:\ProgramData\chocolatey\lib\tesseract\tools"
          }
          Write-Host "Tesseract dir: $tessDir"
          Copy-Item -Recurse -Force $tessDir "${{ github.workspace }}\tesseract"
        shell: pwsh

      - name: Download language data (pol + eng)
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\tessdata"

          # pol
          Invoke-WebRequest -Uri "https://github.com/naptha/tessdata/raw/gh-pages/4.0.0_fast/pol.traineddata.gz" `
            -OutFile "$env:TEMP\pol.traineddata.gz" -UseBasicParsing
          $in  = [System.IO.File]::OpenRead("$env:TEMP\pol.traineddata.gz")
          $out = [System.IO.File]::Create("${{ github.workspace }}\tessdata\pol.traineddata")
          $gz  = New-Object System.IO.Compression.GZipStream($in, [System.IO.Compression.CompressionMode]::Decompress)
          $gz.CopyTo($out); $gz.Close(); $out.Close(); $in.Close()

          # eng
          Invoke-WebRequest -Uri "https://github.com/naptha/tessdata/raw/gh-pages/4.0.0_fast/eng.traineddata.gz" `
            -OutFile "$env:TEMP\eng.traineddata.gz" -UseBasicParsing
          $in  = [System.IO.File]::OpenRead("$env:TEMP\eng.traineddata.gz")
          $out = [System.IO.File]::Create("${{ github.workspace }}\tessdata\eng.traineddata")
          $gz  = New-Object System.IO.Compression.GZipStream($in, [System.IO.Compression.CompressionMode]::Decompress)
          $gz.CopyTo($out); $gz.Close(); $out.Close(); $in.Close()
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: pyinstaller --onefile --windowed --name ImageCompare image_compare.py
        shell: cmd

      - name: Assemble portable folder
        run: |
          New-Item -ItemType Directory -Force -Path "dist\ImageCompare"
          Copy-Item "dist\ImageCompare.exe" "dist\ImageCompare\"
          Copy-Item -Recurse -Force "tesseract" "dist\ImageCompare\tesseract"
          Copy-Item -Recurse -Force "tessdata"  "dist\ImageCompare\tessdata"
          Write-Host "--- Portable folder contents ---"
          Get-ChildItem "dist\ImageCompare" -Recurse | Select-Object FullName
        shell: pwsh

      - name: Create ZIP
        run: Compress-Archive -Path "dist\ImageCompare\*" -DestinationPath "ImageCompare_portable.zip" -Force
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageCompare_portable
          path: ImageCompare_portable.zip
          retention-days: 30
